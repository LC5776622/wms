{% extends 'base.html' %}

{% block title %}Reports{% endblock %}

{% block body %}
<div class="container-fluid row g-3 my-1">
    <ul class="nav nav-tabs" id="myTab" role="tablist">
      {% for data in reports %}
        <li class="nav-item">
          <a class="nav-link {% if forloop.first %}active{% endif %}" id="tab-{{ data.id }}-link" data-toggle="tab" href="#tab-{{ data.id }}-content" role="tab" aria-controls="tab-{{ data.id}}-content" aria-selected="{% if forloop.first %}true{% else %}false{% endif %}">{{ data.report_name }}</a>
        </li>
      {% endfor %}
    </ul>
  
    <div class="tab-content" id="myTabContent">
      {% for data in reports %}
        <div class="tab-pane fade {% if forloop.first %}show active{% endif %}" id="tab-{{ data.id }}-content" role="tabpanel" aria-labelledby="tab-{{ data.id }}-link">
          <iframe title="{{data.report_name}}" width="100%" height="650" src="{{data.url}}" frameborder="0" allowFullScreen="true"></iframe>
        </div>
      {% endfor %}
    </div>
</div>

<script>
  $(document).ready(function() {
    $('#myTab a').on('click', function (e) {
      e.preventDefault();
      $(this).tab('show');
    });
  });
</script>
{% endblock %}
